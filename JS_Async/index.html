<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery JavaScript: Async & Fetch API</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; background: #0f172a; color: white; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #38bdf8; border-bottom: 2px solid #38bdf8; padding-bottom: 10px; }
        .btn { padding: 12px 24px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .btn:disabled { background: #64748b; cursor: not-allowed; }
        .post-list { display: grid; gap: 15px; }
        .post-card { background: #1e293b; padding: 20px; border-radius: 10px; border-left: 5px solid #38bdf8; }
        .loading { font-style: italic; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mastery JS: Async & Fetch API</h1>
        <p>Cara mengambil data dari server tanpa memuat ulang (refresh) halaman.</p>

        <button id="btn-fetch" class="btn">Ambil Data dari Server</button>

        <div id="loader" class="loading" style="display: none;">Sedang mengambil data...</div>
        
        <div id="result-container" class="post-list">
            <!-- Hasil data akan muncul di sini -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
