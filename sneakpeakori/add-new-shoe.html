<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SNEAKPEAK | Add New Shoe</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .fw-black { font-weight: 900; }
        .form-container { max-width: 600px; margin: 3rem auto; background: white; padding: 2.5rem; border-radius: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-label { font-weight: 600; font-size: 0.85rem; text-transform: uppercase; color: #495057; }
        .form-control, .form-select { border-radius: 0.5rem; padding: 0.75rem; border: 1px solid #ced4da; }
        .form-control:focus { border-color: #dc3545; box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.1); }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top py-2">
        <div class="container">
            <div class="d-flex flex-column">
                <a class="navbar-brand fw-black fs-3 mb-0" href="index.html" style="line-height: 1">
                    SNEAK<span class="text-danger">PEAK</span>
                </a>
                <small class="text-muted fw-semibold" style="font-size: 0.75rem">Latihan WEB 1</small>
            </div>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-dark rounded-pill px-4">Kembali</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 class="fw-black mb-4">TAMBAH <span class="text-danger">SEPATU</span></h2>
            
            <form id="add-new-shoe-form">
                <div class="mb-3">
                    <label for="brand" class="form-label">Brand</label>
                    <input type="text" class="form-control" name="brand" id="brand" placeholder="CONTOH: NIKE" required>
                </div>

                <div class="mb-3">
                    <label for="model" class="form-label">Model Name</label>
                    <input type="text" class="form-control" name="model" id="model" placeholder="CONTOH: RETRO DUNK 'PANDA'" required>
                </div>

                <div class="mb-3">
                    <label for="category" class="form-label">Kategori</label>
                    <select name="category" id="category" class="form-select" required>
                        <option value="" selected disabled>Pilih Kategori</option>
                        <option value="sneakers">Sneakers</option>
                        <option value="running">Running</option>
                        <option value="casual">Casual / Slip-on</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="price" class="form-label">Harga (IDR)</label>
                    <input type="number" class="form-control" name="price" id="price" placeholder="1850000" required>
                </div>

                <div class="mb-3">
                    <label for="imageUrl" class="form-label">Image URL</label>
                    <input type="url" class="form-control" name="imageUrl" id="imageUrl" placeholder="https://example.com/shoe.png" required>
                </div>

                <div class="mb-3">
                    <label for="color" class="form-label">Warna Utama</label>
                    <input type="text" class="form-control" name="color" id="color" placeholder="BLACK/WHITE" required>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Deskripsi</label>
                    <textarea class="form-control" name="description" id="description" rows="3" placeholder="Tulis deskripsi singkat..."></textarea>
                </div>

                <div class="mb-4">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" name="inStock" id="inStock" checked>
                        <label class="form-check-label fw-semibold" for="inStock">In Stock / Tersedia</label>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-dark fw-bold py-3 rounded-3">TAMBAH SEPATU</button>
                    <button type="reset" class="btn btn-light text-muted">Reset</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Logic Script -->
    <script src="test/add-new-shoe.js"></script>
</body>
</html>
