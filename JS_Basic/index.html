<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery JavaScript: Dasar JS</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; background: #fafafa; }

        .note { color: #64748b; font-size: 0.9rem; margin-top: 10px; }

</head>
<body>

    <div class="card">
        <h1>Mastery JS: Dasar</h1>

        <div class="note">
            *Buka <strong>Console</strong> pada browser (F12) untuk melihat hasil eksekusi kode lainnya.
        </div>

        <div class="output-box" id="js-output">
            Menunggu JavaScript dijalankan...
        </div>
    </div>

    <!-- MENGHUBUNGKAN JS EKSTERNAL -->
    <script src="script.js"></script>

</html>
